name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: nailsoft, POSTGRES_USER: nailsoft, POSTGRES_PASSWORD: nailsoft }
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U nailsoft -d nailsoft"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nailsoft:nailsoft@localhost:5432/nailsoft
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-high-entropy-secret-change-me-2026
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 11.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - name: Fresh database migration
        run: pnpm db:migrate
      - name: Deterministic seed
        run: pnpm db:seed
      - name: Unit tests
        run: pnpm test:unit
      - name: Integration tests
        run: pnpm test:integration
      - name: API contract tests
        run: pnpm test:contract
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Admin Web E2E smoke
        run: pnpm test:e2e
      - name: Build API
        run: pnpm --filter @nailsoft/api build
      - name: Build Worker
        run: pnpm --filter @nailsoft/worker build
      - name: Build Admin Web
        run: pnpm --filter @nailsoft/admin-web build
      - name: Build Booking Web
        run: pnpm --filter @nailsoft/booking-web build
      - name: Build Owner Mobile
        run: pnpm --filter @nailsoft/owner-mobile build
      - name: Build Staff Mobile
        run: pnpm --filter @nailsoft/staff-mobile build
