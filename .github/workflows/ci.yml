name: CI
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: nailsoft, POSTGRES_USER: nailsoft, POSTGRES_PASSWORD: nailsoft }
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U nailsoft -d nailsoft"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nailsoft:nailsoft@localhost:5432/nailsoft
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-only-high-entropy-secret-change-me-2026
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    steps:
      - uses: actions/checkout@v4
      # pnpm 11 requires Node >=22.13 (node:sqlite). Initialize Node first so
      # pnpm/action-setup executes the package manager with the supported runtime.
      - uses: actions/setup-node@v4
        with: { node-version: 22.14.0 }
      - uses: pnpm/action-setup@v4
        with: { version: 11.7.0 }
      - run: pnpm install --frozen-lockfile
      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee lint.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail -n 40 lint.log | while IFS= read -r line; do
              [ -n "$line" ] && echo "::error title=Lint::$line"
            done
          fi
          exit "$status"
      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail -n 60 typecheck.log | while IFS= read -r line; do
              [ -n "$line" ] && echo "::error title=Typecheck::$line"
            done
          fi
          exit "$status"
      - name: Fresh database migration
        run: pnpm db:migrate
      - name: Sprint 3 migration rollback and re-migrate
        run: pnpm db:rollback && pnpm db:migrate
      - name: Deterministic seed
        run: pnpm db:seed
      - name: Unit tests
        run: pnpm test:unit
      - name: Integration tests
        run: pnpm test:integration
      - name: WebSocket authorization integration
        run: pnpm exec vitest run tests/integration/sprint3-closure-authorization.test.ts
      - name: Durable outbox worker integration
        run: pnpm exec vitest run tests/integration/sprint3-closure-outbox.test.ts
      - name: API contract tests
        run: pnpm test:contract
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Start API and durable Worker for authenticated E2E
        shell: bash
        run: |
          NODE_ENV=development pnpm --filter @nailsoft/api dev > api-e2e.log 2>&1 &
          pnpm --filter @nailsoft/worker dev > worker-e2e.log 2>&1 &
          for i in {1..60}; do
            if curl --fail --silent http://127.0.0.1:3001/v1/health > /dev/null; then exit 0; fi
            sleep 2
          done
          cat api-e2e.log
          exit 1
      - name: Authenticated Sprint 1-3 E2E
        run: pnpm test:e2e
      - name: Sprint 3 closure authenticated E2E
        run: pnpm exec playwright test tests/e2e/sprint3-closure
      - name: Mobile Sprint 2-3 API integration
        run: pnpm exec playwright test tests/e2e/sprint2-mobile-api.spec.ts tests/e2e/sprint3-availability-calendar.spec.ts
      - name: Availability load smoke
        env: { LOAD_DURATION_SECONDS: 2, LOAD_WARMUP_SECONDS: 1, LOAD_CONCURRENCY: 2 }
        run: pnpm load:smoke
      - name: Build API
        run: pnpm --filter @nailsoft/api build
      - name: Build Worker
        run: pnpm --filter @nailsoft/worker build
      - name: Build Admin Web
        run: pnpm --filter @nailsoft/admin-web build
      - name: Build Booking Web
        run: pnpm --filter @nailsoft/booking-web build
      - name: Build Owner Mobile
        run: pnpm --filter @nailsoft/owner-mobile build
      - name: Build Staff Mobile
        run: pnpm --filter @nailsoft/staff-mobile build
