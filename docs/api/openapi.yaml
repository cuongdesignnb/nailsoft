openapi: 3.1.0
info:
  {
    title: Nailsoft API,
    version: 0.6.0,
    description: Sprint 4 booking lifecycle,
    public booking,
    availability and calendar API,
  }
servers: [{ url: http://localhost:3001/v1 }]
security: [{ bearerAuth: [], tenantContext: [] }]
paths:
  /auth/login:
    post:
      tags: [authentication]
      security: []
      summary: Create a device session
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                { schema: { $ref: "#/components/schemas/LoginRequest" } },
            },
        }
      responses:
        {
          "200": { description: Authenticated },
          "401": { description: Invalid credentials },
        }
  /auth/refresh:
    post:
      tags: [authentication]
      security: []
      summary: Rotate a refresh token
      responses:
        {
          "200": { description: Rotated },
          "409": { description: Token reuse detected },
        }
  /auth/sessions:
    get:
      {
        tags: [authentication],
        summary: List own active device sessions,
        responses: { "200": { description: Sessions } },
      }
  /auth/select-workspace:
    post:
      {
        tags: [authentication],
        security: [],
        summary: Select an active tenant membership,
        responses:
          {
            "200": { description: Workspace session created },
            "401": { description: Workspace unavailable },
          },
      }
  /auth/logout:
    post:
      {
        tags: [authentication],
        summary: Revoke current device and clear Web cookies,
        responses: { "204": { description: Logged out } },
      }
  /auth/sessions/{id}/revoke:
    post:
      tags: [authentication]
      summary: Revoke an own device session
      parameters:
        [
          {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      responses: { "204": { description: Revoked } }
  /organization:
    get:
      {
        tags: [organization],
        summary: Read salon configuration,
        responses: { "200": { description: Organization } },
      }
    patch:
      {
        tags: [organization],
        summary: Update salon configuration,
        responses: { "200": { description: Updated } },
      }
  /branches:
    get:
      {
        tags: [organization],
        summary: List authorized branches,
        responses: { "200": { description: Branch list } },
      }
    post:
      {
        tags: [organization],
        summary: Create a branch,
        responses: { "201": { description: Created } },
      }
  /branches/{id}:
    get:
      tags: [organization]
      summary: Read an authorized branch
      parameters:
        [
          {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      responses:
        {
          "200": { description: Branch },
          "403": { description: Outside branch scope },
        }
    patch:
      tags: [organization]
      summary: Update an authorized branch
      parameters:
        [
          {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      responses: { "200": { description: Updated } }
  /branches/{id}/business-hours:
    get:
      {
        tags: [organization],
        summary: Read business hours,
        parameters:
          [
            {
              name: id,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        responses: { "200": { description: Hours } },
      }
    put:
      {
        tags: [organization],
        summary: Replace weekly business hours,
        parameters:
          [
            {
              name: id,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        responses: { "200": { description: Updated } },
      }
  /users:
    get:
      {
        tags: [users],
        summary: List users in authorized scope,
        responses: { "200": { description: Users } },
      }
    post:
      {
        tags: [users],
        summary: Create a tenant and branch-scoped user,
        responses: { "201": { description: Created } },
      }
  /users/{membershipId}/access:
    patch:
      {
        tags: [users],
        summary: Replace membership roles branches and status,
        parameters:
          [
            {
              name: membershipId,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        responses:
          {
            "200": { description: Access updated },
            "409": { description: Last owner or invalid branch },
          },
      }
  /users/{membershipId}/sessions:
    get:
      {
        tags: [users],
        summary: List target sessions in authorized scope,
        parameters:
          [
            {
              name: membershipId,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        responses:
          {
            "200": { description: Sessions },
            "403": { description: Target outside scope },
          },
      }
  /users/{membershipId}/sessions/revoke-all:
    post:
      {
        tags: [users],
        summary: Revoke all target sessions,
        parameters:
          [
            {
              name: membershipId,
              in: path,
              required: true,
              schema: { type: string, format: uuid },
            },
          ],
        responses: { "201": { description: Revoked } },
      }
  /users/invitations:
    post:
      tags: [invitations]
      summary: Invite a member with tenant-scoped roles and branches
      x-permission: user.invite
      responses:
        {
          "201": { description: Invitation created },
          "403": { description: INVITATION_SCOPE_DENIED },
        }
    get:
      tags: [invitations]
      summary: List tenant invitations
      x-permission: user.read
      responses: { "200": { description: Invitation list } }
  /users/invitations/{invitationId}:
    get:
      tags: [invitations]
      x-permission: user.read
      parameters:
        [
          {
            name: invitationId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      responses:
        {
          "200": { description: Invitation },
          "410": { description: INVITATION_NOT_FOUND },
        }
  /users/invitations/{invitationId}/resend:
    post:
      tags: [invitations]
      x-permission: user.invite
      parameters:
        [
          {
            name: invitationId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      responses:
        {
          "201":
            { description: Previous token invalidated and invitation resent },
        }
  /users/invitations/{invitationId}/revoke:
    post:
      tags: [invitations]
      x-permission: user.invite
      parameters:
        [
          {
            name: invitationId,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      responses: { "201": { description: Invitation revoked } }
  /auth/invitations/inspect:
    post:
      tags: [invitations]
      security: []
      summary: Inspect a hashed one-time invitation token
      responses:
        {
          "201": { description: Invitation metadata },
          "410": { description: INVITATION_EXPIRED or INVITATION_NOT_FOUND },
        }
  /auth/invitations/accept:
    post:
      tags: [invitations]
      security: []
      summary: Accept invitation and atomically activate membership
      responses:
        {
          "201": { description: Membership activated },
          "409": { description: INVITATION_ALREADY_USED or INVITATION_REVOKED },
        }
  /auth/forgot-password:
    post:
      tags: [password recovery]
      security: []
      summary: Request recovery with a neutral response
      responses:
        {
          "202":
            { description: Request accepted regardless of account existence },
        }
  /auth/reset-password:
    post:
      tags: [password recovery]
      security: []
      summary: Consume reset token and revoke every device session
      responses:
        {
          "201": { description: Password reset },
          "401": { description: PASSWORD_RESET_INVALID },
          "410": { description: PASSWORD_RESET_EXPIRED },
        }
  /auth/otp/request:
    post:
      tags: [phone authentication]
      security: []
      summary: Request a six-digit OTP with rate and resend limits
      responses:
        {
          "201": { description: OTP challenge created },
          "409": { description: OTP_RATE_LIMITED },
        }
  /auth/otp/verify:
    post:
      tags: [phone authentication]
      security: []
      summary: Consume login OTP and continue workspace or MFA flow
      responses:
        {
          "201": { description: Authentication state },
          "401": { description: OTP_INVALID },
          "410": { description: OTP_EXPIRED },
        }
  /profile/phone/request-verification:
    post:
      {
        tags: [phone authentication],
        summary: Request verification for own phone,
        responses: { "201": { description: Challenge created } },
      }
  /profile/phone/verify:
    post:
      {
        tags: [phone authentication],
        summary: Verify and persist own E.164 phone,
        responses: { "201": { description: Phone verified } },
      }
  /auth/mfa/totp/enroll:
    post:
      tags: [mfa]
      security: []
      summary: Begin TOTP enrollment from an enrollment-only challenge
      responses:
        {
          "201": { description: Secret returned once },
          "403": { description: MFA_RESET_DENIED },
        }
  /auth/mfa/totp/confirm:
    post:
      tags: [mfa]
      security: []
      summary: Confirm TOTP and return recovery codes once
      responses:
        {
          "201": { description: Authenticated session },
          "401": { description: MFA_CHALLENGE_INVALID },
        }
  /auth/mfa/challenge/verify:
    post:
      tags: [mfa]
      security: []
      summary: Verify login TOTP challenge and create session
      responses:
        {
          "201": { description: Authenticated session },
          "401":
            { description: MFA_CHALLENGE_INVALID or MFA_CHALLENGE_EXPIRED },
        }
  /auth/mfa/recovery/verify:
    post:
      tags: [mfa]
      security: []
      summary: Consume one recovery code and create session
      responses:
        {
          "201": { description: Authenticated session },
          "401": { description: MFA_RECOVERY_CODE_INVALID },
        }
  /auth/mfa/recovery/regenerate:
    post:
      {
        tags: [mfa],
        summary: Invalidate old recovery codes and create a new set,
        responses: { "201": { description: Codes returned once } },
      }
  /auth/mfa/status:
    get:
      {
        tags: [mfa],
        summary: Read own MFA status,
        responses: { "200": { description: MFA status } },
      }
  /auth/mfa/totp:
    delete:
      {
        tags: [mfa],
        summary: Disable TOTP after step-up verification,
        responses:
          {
            "200": { description: MFA disabled },
            "401": { description: MFA_CHALLENGE_INVALID },
          },
      }
  /auth/sessions/{id}:
    delete:
      tags: [sessions]
      summary: Revoke an own session
      parameters:
        [
          {
            name: id,
            in: path,
            required: true,
            schema: { type: string, format: uuid },
          },
        ]
      responses:
        {
          "204": { description: Session revoked },
          "401": { description: SESSION_NOT_FOUND },
        }
  /ready:
    get:
      {
        tags: [system],
        security: [],
        summary: Database readiness,
        responses:
          { "200": { description: Ready }, "503": { description: Not ready } },
      }
  /health:
    get:
      operationId: getHealth
      tags: [system]
      security: []
      responses:
        "200":
          {
            description: Healthy,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/HealthResponse" } },
              },
          }
  /service-categories:
    get:
      {
        tags: [service-catalog],
        summary: List categories,
        responses: { "200": { description: Categories } },
      }
    post:
      {
        tags: [service-catalog],
        summary: Create category,
        responses: { "201": { description: Created } },
      }
  /service-categories/{id}:
    get:
      {
        tags: [service-catalog],
        summary: Get category,
        responses: { "200": { description: Category } },
      }
    patch:
      {
        tags: [service-catalog],
        summary: Update category,
        responses:
          {
            "200": { description: Updated },
            "409": { description: Version conflict },
          },
      }
  /services:
    get:
      {
        tags: [service-catalog],
        summary: List services,
        responses: { "200": { description: Services } },
      }
    post:
      {
        tags: [service-catalog],
        summary: Create service,
        responses: { "201": { description: Created } },
      }
  /services/{id}:
    get:
      {
        tags: [service-catalog],
        summary: Get service,
        responses: { "200": { description: Service } },
      }
    patch:
      {
        tags: [service-catalog],
        summary: Update service,
        responses:
          {
            "200": { description: Updated },
            "409": { description: Version conflict },
          },
      }
  /services/{id}/prices:
    get:
      {
        tags: [service-catalog],
        summary: List service prices,
        responses: { "200": { description: Prices } },
      }
    post:
      {
        tags: [service-catalog],
        summary: Create service price,
        responses:
          {
            "201": { description: Created },
            "409": { description: Price overlap },
          },
      }
  /skills:
    get:
      {
        tags: [service-catalog],
        summary: List skills,
        responses: { "200": { description: Skills } },
      }
    post:
      {
        tags: [service-catalog],
        summary: Create skill,
        responses: { "201": { description: Created } },
      }
  /resources:
    get:
      {
        tags: [service-catalog],
        summary: List branch resources,
        responses: { "200": { description: Resources } },
      }
    post:
      {
        tags: [service-catalog],
        summary: Create resource,
        responses: { "201": { description: Created } },
      }
  /staff:
    get:
      {
        tags: [staff],
        summary: List staff,
        responses: { "200": { description: Staff } },
      }
    post:
      {
        tags: [staff],
        summary: Create staff profile,
        responses: { "201": { description: Created } },
      }
  /staff/me:
    get:
      {
        tags: [staff],
        summary: Read the authenticated staff profile,
        responses:
          {
            "200": { description: Profile },
            "403": { description: Platform tenant denial },
          },
      }
  /staff/{id}/branches:
    get:
      {
        tags: [staff],
        summary: List operational assignments,
        responses: { "200": { description: Assignments } },
      }
    post:
      {
        tags: [staff],
        summary: Assign staff branch,
        responses: { "201": { description: Created } },
      }
  /staff/{id}/skills:
    get:
      {
        tags: [staff],
        summary: List staff skills,
        responses: { "200": { description: Skills } },
      }
    put:
      {
        tags: [staff],
        summary: Replace staff skills,
        responses: { "200": { description: Updated } },
      }
  /shifts:
    get:
      {
        tags: [staff],
        summary: List shifts,
        responses: { "200": { description: Shifts } },
      }
    post:
      {
        tags: [staff],
        summary: Create shift,
        responses: { "201": { description: Created } },
      }
  /leave-requests:
    get:
      {
        tags: [staff],
        summary: List leave requests,
        responses:
          {
            "200": { description: Leave requests },
            "409": { description: Version or state conflict },
          },
      }
    post:
      {
        tags: [staff],
        summary: Create leave request,
        requestBody:
          {
            required: true,
            content:
              {
                application/json:
                  {
                    schema: { $ref: "#/components/schemas/LeaveRequestInput" },
                  },
              },
          },
        responses:
          {
            "201": { description: Created },
            "409": { description: Idempotency or state conflict },
          },
      }

  /availability:
    get:
      tags: [availability]
      summary: Calculate authoritative availability
      parameters:
        - {
            name: branchId,
            in: query,
            required: true,
            schema: { type: string, format: uuid },
          }
        - {
            name: serviceId,
            in: query,
            required: true,
            schema: { type: string, format: uuid },
          }
        - {
            name: dateFrom,
            in: query,
            required: true,
            schema: { type: string, format: date },
          }
        - {
            name: dateTo,
            in: query,
            required: true,
            schema: { type: string, format: date },
          }
        - { name: staffId, in: query, schema: { type: string, format: uuid } }
        - {
            name: slotIntervalMin,
            in: query,
            schema: { enum: [5, 10, 15, 30], default: 15 },
          }
      responses:
        {
          "200": { description: Availability result },
          "400": { description: Invalid range or interval },
          "403": { description: Outside branch scope },
          "409":
            {
              description: Branch exists but is inactive; AVAILABILITY_BRANCH_INACTIVE,
            },
        }
  /availability/explain:
    post:
      tags: [availability]
      summary: Explain availability at an instant
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "#/components/schemas/AvailabilityExplainRequest" },
                },
            },
        }
      responses:
        "200":
          description: Rule-by-rule explanation; available=true implies no blockingReasons and every blocking rule is true
          content:
            {
              application/json:
                {
                  schema:
                    {
                      $ref: "#/components/schemas/AvailabilityExplainResponse",
                    },
                },
            }
        "409": { description: Branch exists but is inactive }
  /calendar/events:
    get:
      tags: [calendar]
      summary: Read normalized shift, leave and busy-block events
      responses:
        {
          "200": { description: Calendar events },
          "403": { description: Branch or own-calendar scope denied },
        }
  /calendar/summary:
    get:
      {
        tags: [calendar],
        summary: Read calendar daily summary,
        responses: { "200": { description: Daily summary } },
      }
  /availability-blocks:
    get:
      {
        tags: [availability-blocks],
        summary: List blocks,
        responses: { "200": { description: Blocks } },
      }
    post:
      tags: [availability-blocks]
      summary: Create an audited manual, external or maintenance block
      requestBody:
        {
          required: true,
          content:
            {
              application/json:
                {
                  schema:
                    { $ref: "#/components/schemas/AvailabilityBlockInput" },
                },
            },
        }
      responses:
        {
          "200": { description: Created or idempotently replayed },
          "400": { description: Invalid target or range },
        }
  /availability-blocks/{blockId}:
    get:
      {
        tags: [availability-blocks],
        summary: Read block,
        responses:
          { "200": { description: Block }, "404": { description: Not found } },
      }
    patch:
      {
        tags: [availability-blocks],
        summary: Update block with optimistic version,
        responses:
          {
            "200": { description: Updated },
            "409": { description: Version conflict },
          },
      }
  /availability-blocks/{blockId}/cancel:
    post:
      {
        tags: [availability-blocks],
        summary: Cancel block without hard delete,
        responses:
          {
            "200": { description: Cancelled },
            "409": { description: Version or status conflict },
          },
      }
  /booking-plans:
    post:
      {
        tags: [booking],
        summary: Build a sequential service plan from authoritative availability,
        requestBody:
          {
            required: true,
            content:
              {
                application/json:
                  {
                    schema: { $ref: "#/components/schemas/BookingPlanRequest" },
                  },
              },
          },
        responses:
          {
            "201": { description: Booking plan },
            "409": { description: Availability changed or slot unavailable },
          },
      }
  /slot-holds:
    post:
      {
        tags: [booking],
        summary: Reserve staff and resources for a short TTL,
        parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }],
        requestBody:
          {
            required: true,
            content:
              {
                application/json:
                  {
                    schema:
                      { $ref: "#/components/schemas/CreateSlotHoldRequest" },
                  },
              },
          },
        responses:
          {
            "201": { description: Active hold and scoped hold capability },
            "409":
              {
                description: Staff/resource conflict,
                stale availability or hold limit,
              },
          },
      }
  /slot-holds/{holdId}:
    get:
      {
        tags: [booking],
        summary: Read a tenant-scoped hold,
        responses:
          {
            "200": { description: Hold },
            "404": { description: Hold not found },
          },
      }
  /slot-holds/{holdId}/release:
    post:
      {
        tags: [booking],
        summary: Release a hold and its reservations,
        parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }],
        responses:
          {
            "201": { description: Released or idempotently replayed },
            "409": { description: Hold state conflict },
          },
      }
  /appointments:
    get:
      {
        tags: [appointments],
        summary: Search branch/own appointments,
        responses:
          {
            "200": { description: Appointment summaries },
            "403": { description: Tenant, branch or own scope denied },
          },
      }
    post:
      {
        tags: [appointments],
        summary: Atomically consume a hold and create an appointment,
        parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }],
        requestBody:
          {
            required: true,
            content:
              {
                application/json:
                  {
                    schema:
                      { $ref: "#/components/schemas/CreateAppointmentRequest" },
                  },
              },
          },
        responses:
          {
            "201": { description: Created appointment },
            "409":
              { description: Hold expired/consumed or idempotency conflict },
          },
      }
  /appointments/{appointmentId}:
    get:
      {
        tags: [appointments],
        summary: Read permission-shaped appointment detail,
        responses:
          {
            "200": { description: Appointment detail },
            "403": { description: Branch or own assignment denied },
            "404": { description: Not found },
          },
      }
  /appointments/{appointmentId}/history:
    get:
      {
        tags: [appointments],
        summary: Read append-only status history,
        responses: { "200": { description: History } },
      }
  /appointments/{appointmentId}/schedule-revisions:
    get:
      {
        tags: [appointments],
        summary: Read append-only schedule revisions,
        responses: { "200": { description: Revisions } },
      }
  /appointments/{appointmentId}/confirm:
    post:
      {
        tags: [appointments],
        summary: Confirm a pending appointment,
        parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }],
        responses:
          {
            "201": { description: Confirmed },
            "409": { description: Version, state or deposit conflict },
          },
      }
  /appointments/{appointmentId}/reschedule:
    post:
      {
        tags: [appointments],
        summary: Atomically replace reservations while preserving price snapshots,
        parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }],
        requestBody:
          {
            required: true,
            content:
              {
                application/json:
                  {
                    schema: { $ref: "#/components/schemas/RescheduleRequest" },
                  },
              },
          },
        responses:
          {
            "201":
              { description: Rescheduled; current state remains CONFIRMED },
            "409": { description: Version, service or reservation conflict },
          },
      }
  /appointments/{appointmentId}/cancel:
    post:
      {
        tags: [appointments],
        summary: Cancel without deleting the appointment,
        parameters: [{ $ref: "#/components/parameters/IdempotencyKey" }],
        requestBody:
          {
            required: true,
            content:
              {
                application/json:
                  { schema: { $ref: "#/components/schemas/CancelRequest" } },
              },
          },
        responses:
          {
            "201": { description: Cancelled with policy outcome },
            "409": { description: Version or state conflict },
          },
      }
