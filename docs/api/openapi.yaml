components:
  parameters:
    IdempotencyKey:
      {
        name: Idempotency-Key,
        in: header,
        required: true,
        schema: { type: string, minLength: 16, maxLength: 128 },
        description: Actor-scoped command replay key; raw value is never logged,
      }
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
    tenantContext:
      {
        type: apiKey,
        in: header,
        name: X-Tenant-Id,
        description: Requested tenant scope; always verified against the authenticated membership,
      }
  schemas:
    AvailabilityExplainRequest:
      type: object
      required: [branchId, serviceId, startAt]
      properties:
        branchId: { type: string, format: uuid }
        serviceId: { type: string, format: uuid }
        startAt: { type: string, format: date-time }
        staffId: { type: string, format: uuid }
    AvailabilityReason:
      type: object
      required: [code, count]
      properties:
        code: { type: string }
        count: { type: integer, minimum: 1 }
    AvailabilityExplainResponse:
      type: object
      required:
        [
          available,
          startAt,
          timezone,
          blockingReasons,
          warnings,
          rules,
          resourceSummary,
          staffCandidates,
        ]
      properties:
        available: { type: boolean }
        startAt: { type: string, format: date-time }
        timezone: { type: string }
        reasons:
          type: array
          deprecated: true
          description: Backward-compatible alias of blockingReasons.
          items: { $ref: "#/components/schemas/AvailabilityReason" }
        blockingReasons:
          type: array
          items: { $ref: "#/components/schemas/AvailabilityReason" }
        warnings:
          type: array
          description: Non-blocking diagnostics such as partial RESOURCE_MAINTENANCE or offset-explicit DST_AMBIGUOUS.
          items: { $ref: "#/components/schemas/AvailabilityReason" }
        rules:
          type: object
          required: [businessHours, staff, resources, price, timezone]
          properties:
            businessHours: { type: boolean }
            staff: { type: boolean }
            resources: { type: boolean }
            price: { type: boolean }
            timezone: { type: boolean }
        resourceSummary: { type: array, items: { type: object } }
        staffCandidates: { type: array, items: { type: object } }
    AvailabilityBlockInput:
      type: object
      required: [branchId, blockType, title, startAt, endAt]
      properties:
        branchId: { type: string, format: uuid }
        staffId: { type: string, format: uuid }
        resourceId: { type: string, format: uuid }
        blockType: { enum: [MANUAL, EXTERNAL, MAINTENANCE] }
        title: { type: string, maxLength: 200 }
        startAt: { type: string, format: date-time }
        endAt: { type: string, format: date-time }
        source: { type: string }
        sourceReference: { type: string }
        notes: { type: string }
    StaffPreference:
      oneOf:
        - {
            type: object,
            required: [type],
            properties: { type: { const: ANY } },
          }
        - {
            type: object,
            required: [type, staffId],
            properties:
              {
                type: { const: SPECIFIC },
                staffId: { type: string, format: uuid },
              },
          }
    BookingPlanRequest:
      type: object
      required: [branchId, desiredStartAt, items]
      properties:
        branchId: { type: string, format: uuid }
        desiredStartAt: { type: string, format: date-time }
        items:
          {
            type: array,
            minItems: 1,
            maxItems: 5,
            items:
              {
                type: object,
                required: [serviceId, staffPreference],
                properties:
                  {
                    serviceId: { type: string, format: uuid },
                    staffPreference:
                      { $ref: "#/components/schemas/StaffPreference" },
                    availabilityFingerprint:
                      { type: string, minLength: 64, maxLength: 64 },
                  },
              },
          }
    CreateSlotHoldRequest:
      allOf:
        - { $ref: "#/components/schemas/BookingPlanRequest" }
        - {
            type: object,
            properties:
              {
                availabilityDataVersion: { type: integer, minimum: 1 },
                clientKey: { type: string },
                source: { enum: [CUSTOMER_WEB, RECEPTION, OWNER_MOBILE, API] },
              },
          }
    CreateAppointmentRequest:
      type: object
      required: [holdId, customer]
      properties:
        holdId: { type: string, format: uuid }
        holdToken: { type: string, writeOnly: true }
        contactVerificationToken: { type: string, writeOnly: true }
        customer:
          {
            type: object,
            properties:
              {
                customerId: { type: string, format: uuid },
                displayName: { type: string },
                phone: { type: string },
                email: { type: string, format: email },
                locale: { enum: [vi-VN, en-US] },
              },
          }
        customerNote: { type: string, maxLength: 2000 }
        internalNote: { type: string, maxLength: 4000 }
        marketingConsent: { type: boolean, default: false }
        confirm: { type: boolean, default: true }
    RescheduleRequest:
      type: object
      required: [version, replacementHoldId, reasonCode]
      properties:
        {
          version: { type: integer, minimum: 1 },
          replacementHoldId: { type: string, format: uuid },
          replacementHoldToken: { type: string, writeOnly: true },
          reasonCode: { type: string },
          note: { type: string },
        }
    CancelRequest:
      type: object
      required: [version, reasonCode]
      properties:
        {
          version: { type: integer, minimum: 1 },
          reasonCode: { type: string },
          note: { type: string },
          actorType: { enum: [USER, CUSTOMER], default: USER },
          policyOverrideReason: { type: string },
        }
    LoginRequest:
      type: object
      required: [tenantSlug, email, password, deviceId, deviceName, platform]
      properties:
        tenantSlug: { type: string }
        email: { type: string, format: email }
        password: { type: string, format: password, minLength: 8 }
        deviceId: { type: string }
        deviceName: { type: string }
        platform: { enum: [web, ios, android] }
    LeaveRequestInput:
      type: object
      required: [staffId, branchId, startAt, endAt]
      properties:
        staffId: { type: string, format: uuid }
        branchId: { type: string, format: uuid }
        leaveType: { enum: [PERSONAL, SICK, ANNUAL, UNPAID, OTHER] }
        startAt: { type: string, format: date-time }
        endAt: { type: string, format: date-time }
        reason: { type: string, nullable: true }
    HealthResponse:
      type: object
      required: [success, data, meta]
      properties:
        success: { const: true }
        data:
          {
            type: object,
            required: [status, service],
            properties: { status: { const: ok }, service: { const: api } },
          }
        meta: { $ref: "#/components/schemas/Meta" }
    Meta:
      type: object
      required: [requestId, timestamp]
      properties:
        {
          requestId: { type: string },
          timestamp: { type: string, format: date-time },
        }
